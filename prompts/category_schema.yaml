# category_schema.yaml
#
# SOURCE OF TRUTH for the RSE typology used in the LNI study. Read by
# src/categories.py (via schema_io.py) to build the annotation prompt, and
# edited by the category-narrowing loop (src/narrow_categories.py). The old
# prompts/category_whitelist.json is retired.
#
# Per dimension:
#   active     - the subcategories the prompt offers the model. An ACTIVE entry
#                with an empty `description:` is EXCLUDED from the prompt (and a
#                warning is printed) until you fill the description in. An optional
#                `examples:` list holds alternate subcategory names that were merged
#                INTO this one; they are rendered after the description as a synonym
#                whitelist ("auch: ...") and are NOT re-offered as new candidates.
#   rejected   - subcategories the human ruled out (reason + optional move_to);
#                rendered as "do not use" guidance in the prompt.
#   candidates - merge-not-clobber inbox the loop's `collect` step appends the
#                model's new_suggestion subcategories to; `review` (or editing
#                this file) promotes each into active/rejected.
#
# Edited BY HAND between narrowing rounds (rename, merge, fill descriptions) or
# via `run_pipeline.cmd review`. ruamel round-trips this file, so comments and
# layout survive the loop's automated edits. Generated 2026-06-17 from the state
# after the first `review` pass (source_candidates: category_candidates_narrow.csv).

gate:
  key: label_research_software
  definition_de: >
    Forschungssoftware umfasst Quellcode-Dateien, Algorithmen, Skripte,
    rechnergestützte Arbeitsabläufe (Workflows), Bibliotheken und ausführbare
    Programme, die zu einem Forschungszweck erstellt, erweitert oder maßgeblich
    angepasst wurden. Die bloße Anwendung allgemein verfügbarer Standardsoftware
    ohne eigene Entwicklungsleistung gilt NICHT als Forschungssoftware.

dimensions:

  research_position:
    label: Position im Forschungsprozess
    question: >
      An welcher Stelle des Forschungsprozesses wird die Forschungssoftware
      eingesetzt? Wozu dient sie primär?
      Wichtig: Die prozessbezogenen Kategorien (Datenerhebung, Datenanalyse,
      Simulation/Modellierung, Mensch-zugewandte Intervention,
      Visualisierung/Dissemination) gelten nur, wenn die Software diese Funktion
      für ein explizit genanntes übergeordnetes Forschungsziel erfüllt — nicht
      schon, weil sie es technisch könnte. Mündet der Forschungsprozess allein
      in der Software selbst (mögliche künftige Nutzung), ist sie
      `product_result` oder `proof_of_concept_product`.
    multi: false
    active:
      - key: datenerhebung
        source: seed
        description: Datenerhebung / data acquisition (Sensorik, Crawler, Logging, Erhebungsinstrumente).
      - key: datenanalyse
        source: seed
        description: >
          Datenanalyse / data analysis (Statistik, Auswertung, ML-Pipelines):
          die Software analysiert Daten für ein explizit genanntes
          übergeordnetes Forschungsziel. Die bloße Analysefähigkeit der Software
          genügt nicht — mündet der Prozess nur in der Software (künftige Nutzung
          denkbar), ist sie `product_result` oder `proof_of_concept_product`.
      - key: simulation_modellierung
        source: seed
        description: Simulation oder Modellierung (numerische Modelle, Agentenmodelle).
      - key: human_facing_intervention
        source: seed
        description: Mensch-zugewandte Intervention (System, mit dem Versuchspersonen interagieren).
      - key: visualisierung_dissemination
        source: seed
        description: Visualisierung oder Dissemination (Dashboards, interaktive Abbildungen).
      - key: formal_verification
        source: added
        description: formale Verifikation oder Beweisführung ist eine spezielle Form von RSE und folgt daher auch eingem eignen Process und damit auch eine eigene (neue) Position
      - key: research_infrastructure_support
        source: added
        description: "Die Software dient primär der Unterstützung von Software-Entwicklungsprozessen (Versionsmanagement, Aufgaben- und Fehlerverwaltung, kontinuierliche Integration) und ist damit eine Infrastruktur für Forschungs- und Entwicklungsprojekte. Da 'infrastruktur_tooling' als Subkategorie abgelehnt wurde, wird 'research_infrastructure_support' als neue Subkategorie vorgeschlagen, da die Position im Forschungsprozess die Bereitstellung einer Entwicklungsinfrastruktur ist (vgl. Text: 'Schaffung einer Infrastruktur für Software-Entwicklung')."
      - key: testing
        source: coder:alice
        description: >
          Die Forschungssoftware dient primär dem Testen / der Erprobung — sie ist
          das Instrument, mit dem ein Verfahren, eine Methode oder eine Hypothese
          im Forschungsprozess geprüft wird (Testumgebung, Testbed,
          Benchmark-Harness). Abzugrenzen von der Dimension `evaluation` (Nachweis
          von Nutzen/Wirkung der Software selbst) und von der Lebenszyklusphase
          `testen_qualitaetssicherung` (Qualitätssicherung der Software).
      - key: product_result
        source: coder:bob
        description: Die Software ist das Produkt der Forschung oder ihr Ziel
      - key: proof_of_concept_product
        source: coder:alice
        description: Das Ziel der Studie ist primär, den Algorithmus zu entwickeln, die Software hat hier die Rolle diesen prototypisch umzusetzen und zu zeigen, dass es funktioniert
    rejected:
      - key: infrastruktur_tooling
        was: seed
        reason: >
          Belongs to TYPE of software, not the position in the research process.
        move_to: software_type
      - key: research_infrastructure_management
        reason: research infrastructure software fällt nicht unter die engere Definition von Forschungssoftware als Teil eines konkreten Forschungsprozesses
    candidates: []
  software_lifecycle:
    label: Phase im Software-Lebenszyklus
    question: >
      Welche Phase(n) des Software-Lebenszyklus behandelt das Paper im Bezug auf
      die Forschungssoftware? Mehrfachnennung möglich (die Phasen bauen im
      Idealfall aufeinander auf).
    multi: true
    # Seeds from software_prozesskategorien.md (2026-06-19): the six classical
    # software-lifecycle phases. This dimension REPLACES the former `methodology`
    # dimension ("Dies statt der Methodologiefrage"). Coders refine via the
    # narrowing loop (candidates -> active/rejected) and the goldstandard `new`
    # option as usual.
    active:
      - key: projektdefinition
        source: seed
        description: >
          Projektdefinition / -hintergrund: Ideenfindung, Vision, Design-Idee,
          Stakeholder- und Kundenbezug, Motivation und Problemraum — der Schritt,
          bevor formale Anforderungen festgehalten werden.
      - key: anforderungen
        source: seed
        description: >
          Anforderungen / Requirements Engineering: Erhebung, Analyse und
          Spezifikation funktionaler und nicht-funktionaler Anforderungen.
      - key: entwurf
        source: seed
        description: >
          Entwurf / Design: Architektur, Modellierung, Schnittstellen- und
          Komponentendesign der Software.
      - key: implementierung
        source: seed
        description: >
          Implementierung: konkrete Umsetzung in Code (Programmierung, Integration
          von Komponenten, Werkzeuge der Entwicklung).
      - key: testen_qualitaetssicherung
        source: seed
        description: >
          Testen / Qualitätssicherung: Verifikation und Validierung, Tests,
          Qualitätssicherung und Fehlerbehebung. (Abzugrenzen von der Dimension
          `evaluation`, die den Nachweis von Nutzen/Wirkung der Software betrifft.)
      - key: deployment_betrieb
        source: seed
        description: >
          Deployment / Betrieb: Auslieferung, Installation, Inbetriebnahme,
          Wartung und laufender Betrieb der Software. Es sollten klare längerfristige Schritte der Nutzung und Verwertung erklärt sein.
    rejected: []
    candidates: []
  software_type:
    label: Art der Software
    question: Um welche Art von Software handelt es sich technisch?
    multi: true
    active:
      - key: script
        source: seed
        description: >
          Skript / lineare Analyse: kleine, oft einzelne Ausführungsfäden oder
          lineare Programme, die Analyseschritte abarbeiten (interaktive Schritte
          möglich) — inklusive Command-Line-Tools mit Nutzerinteraktion und
          notebook-basierter Analyse (Jupyter, R Markdown).
        examples:
          - cmd_tool
          - analysis_pipeline
          - notebook
      - key: library_package
        source: seed
        description: >
          Bibliothek, Paket oder Framework (zur Wiederverwendung durch andere),
          inkl. Test-Automatisierungs-Frameworks und Testcode-Generatoren.
        examples:
          - matching_framework
          - analysis_toolkit
          - feature_detection_toolkit
          - test_automation_framework
          - testing_framework
          - test_code_generator
      - key: full_stack_application
        source: seed
        description: Full-Stack-Anwendung (Frontend + Backend, häufig webbasiert).
        examples:
          - e_learning_multimedia_system
          - middleware_data_processing_system
      - key: numerical_mathematical
        source: seed
        description: Numerisch/mathematisch fokussierte Software (Solver, Berechnungskerne).
        examples:
          - verification_tool
          - theorem_prover
      - key: embedded_hardware
        source: seed
        description: Embedded / hardwarenahe Software (Mikrocontroller, Robotik).
        examples:
          - middleware_firmware
          - embedded_activity_recognition_toolkit
      - key: plugin_extension
        source: seed
        description: Plugin/Erweiterung eines bestehenden Systems (z.B. Moodle-Plugin).
        examples:
          - model_simulator
          - neural_network_framework
      - key: domain_specific_language
        source: added
        description: "Domänenspezifische Sprache (DSL): eigens entworfene Sprache oder Notation für ein spezifisches Anwendungsgebiet."
      - key: vr_application
        source: added
        description: VR Applikationen sind eine spezifische Art von Forschungssoftware.
        examples:
          - mixed_reality_application
      - key: middleware_service
        source: added
        description: "Middleware / dienstorientierte Software: verbindende Schicht zwischen Systemen — Web-Services/APIs, Proxy-Server, Workflow-Management-Systeme sowie Integrations- und Vermittlungsdienste."
        examples:
          - middleware_service_integration
          - middleware_integration_tool
    rejected:
      - key: web_service_api
        was: seed
        reason: More of a component than the whole type of software.
        move_to: middleware_service
      - key: proxy_server_application
        reason: All middleware and service-oriented architectures should be one category.
        move_to: middleware_service
      - key: workflow_management_system
        reason: Should be grouped with middleware.
        move_to: middleware_service
      - key: middleware_integration
        reason: Should be grouped with other middleware type.
        move_to: middleware_service
      - key: network_routing_tool
        reason: Too specific.
      - key: educational_template
        reason: Should be grouped with plugins.
        move_to: plugin_extension
      - key: schema_generation_framework
        reason: Too specific; group with small tooling for recurring purposes.
      - key: signal_processing_toolkit
        reason: Should be grouped with tooling/toolkits.
      - key: photogrammetry_software
        reason: It is a full-stack application.
        move_to: full_stack_application
      - key: database_extension_framework
        reason: ""
      - key: formal_process_language
        reason: Should be grouped with models / modelling language.
      - key: integration_extension
        reason: sollte mit plugin_extension gemerged werden
        move_to: plugin_extension
      - key: data_fusion_framework
        reason: ''
      - key: visualization_tool
        reason: visualization is the purpose (related to position in the research process) not the type of RSE
      - key: requirements_engineering_tool
        reason: Das ist keine neue Kategorie, da Requirements Engineering kein neuer Typus ist sondern der Anwendungsfall
      - key: infrastructure_management_system
        reason: die spezielle Ausrichtung ist hier nicht so entscheidend
      - key: brand_new_thing
        reason: is not specific enough
      - key: neural_network_agent_framework
        reason: frameworks sind als packages oder libraries zuzuordnen
      - key: network_measurement_tool
        reason: networkk_measurement is too specific
        move_to: instead use distributed system/framework
      - key: conceptual
        reason: >
          Not a software type but the absence of one; already covered by the
          gate. Caused several ICR mismatches (coded against a real type).
      - key: data_exchange_standard
        reason: A standard/schema, not software in the narrower sense; unused.
      - key: reengineering_tool
        reason: Overlaps with library/tooling; unused.
      - key: simulation_framework
        reason: >
          Near-duplicate of numerical_mathematical (its own rationale admitted
          the overlap).
        move_to: numerical_mathematical
      - key: test_automation_framework
        reason: A framework, i.e. a library/package; folded into library_package.
        move_to: library_package
      - key: deep_learning_model
        reason: >
          A model-as-artifact axis cross-cutting the structural types; coders
          split it against numerical_mathematical / library_package.
      - key: cmd_tool
        reason: Granularity too fine to code reliably; merged into the script category.
        move_to: script
      - key: analysis_pipeline
        reason: Merged into the script category.
        move_to: script
      - key: notebook
        reason: Merged into the script category.
        move_to: script
    candidates:
      - key: mobile_data_capture_application
        count: 3
        example_ids: lni15/GI-Proceedings.15-1
        rationale: Die beschriebenen Systeme umfassen oft eine Kombination aus Frontend (z.B. Benutzeroberfläche auf mobilen Geräten) und Backend-Funktionalitäten (z.B. Datenspeicherung, Zeitstempel, Datenübertragung). Beispiele sind 'MiniDoc electronic patient diary' und 'Compu-Void II', die als vollständige Anwendungen für die Datenerfassung und -verarbeitung dienen. Da 'full_stack_application' die nächstliegende Kategorie ist, wird diese gewählt, aber eine präzisere Kategorie wie 'mobile_data_capture_application' wäre sinnvoll.
      - key: variability_management_toolkit
        count: 2
        example_ids: lni159/189
        rationale: Die entwickelte Metriken-Suite und der Frame-Prozessor ([PM03]) sind als wiederverwendbare Werkzeuge konzipiert, die in Produktlinien-Entwicklungsprozesse integriert werden können. Der Text spricht von 'pattern language of variability mechanisms' und 'metrics suite' (Kapitel 3 und 4), was auf ein Toolkit oder Framework hindeutet. Da 'library_package' nicht perfekt passt, wird 'variability_management_toolkit' als präzisere Subkategorie vorgeschlagen.
  techstack:
    label: Techstack / Programmiersprachen
    question: >
      Welche Programmiersprachen bzw. Technologien werden verwendet?
      Mehrfachnennung möglich.
    multi: true
    multi_narrow: true
    active:
      - key: python
        source: seed
        description: Python.
      - key: java_jvm
        source: seed
        description: Java oder andere JVM-Sprachen (Kotlin, Scala).
      - key: javascript_web
        source: seed
        description: JavaScript/TypeScript + Web-Frontend (HTML/CSS, React, ...).
      - key: c_cpp
        source: seed
        description: C oder C++.
      - key: csharp_dotnet
        source: seed
        description: C# / .NET.
      - key: r_lang
        source: seed
        description: R.
      - key: matlab
        source: seed
        description: MATLAB.
      - key: sql_db
        source: seed
        description: SQL / Datenbanken.
      - key: perl
        source: added
        description: Perl.
        examples:
          - perl_web
      - key: xml_xsd
        source: added
        description: "XML-Technologien (XML, XSD/XML-Schema, GML)."
        examples:
          - xml_schema_gml
      - key: hardware_description_languages
        source: added
        description: Hardware-Beschreibungssprachen (z.B. VHDL, Verilog).
        examples:
          - hdl_hardware_description
      - key: flash_animation_tools
        source: added
        description: Flash-/SWF-Animationswerkzeuge (Macromedia/Adobe Flash).
      - key: visual_basic
        source: added
        description: Visual Basic (inkl. ActiveX-/COM-Komponenten).
      - key: linden_scripting_language
        source: added
        description: "Die explizit genannte Technologie ist die Linden Scripting Language (LSL), die für die Implementierung der virtuellen Labore verwendet wird (vgl. Abschnitt 2.3: 'In-world können sie 3D-Objekte erstellen und diese per eingebauter Scriptsprache, der Linden Scripting Language (LSL), mit Funktionalität füllen.'). LSL ist eine skriptbasierte Sprache, die Ähnlichkeiten mit JavaScript aufweist, aber nicht explizit als solche klassifiziert wird. Da LSL nicht in den vorgegebenen Subkategorien enthalten ist, wird eine neue Subkategorie vorgeschlagen. Zusätzlich könnte die Nutzung von Second Life als webbasierte Plattform auf JavaScript/TypeScript hindeuten, dies ist jedoch nicht explizit belegt."
      - key: scratch_programming_environment
        source: added
        description: Die Publikation erwähnt explizit die Verwendung von Scratch als Programmierumgebung und den Einsatz eines Java-Players für Animationen und Beispiele. Scratch ist eine visuelle Programmiersprache, die auf Smalltalk/Squeak aufbaut, aber nicht explizit einer der vorgegebenen Kategorien zugeordnet werden kann. Daher wird 'scratch' als Technologie genannt und 'scratch_programming_environment' als neue Subkategorie vorgeschlagen. Zudem ist die Webbasierung implizit durch die Nutzung von HTML, Videos und interaktiven Elementen gegeben (vgl. Abschnitt 3.9 und 4.3).
      - key: alloy_language
        source: added
        description: Alloy ist eine Programmiersprache
      - key: formal_specification_languages
        source: coder:bob
        description: >
          Umbrella category for formal specification / verification languages
          (e.g. Alloy, TLA+, Z, B-Method) used to formally model and verify
          system behaviour rather than to implement it imperatively. (Overlaps
          the existing `alloy_language` entry.)
    rejected:
      - key: conceptual
        reason: >
          Not a techstack; the absence of an implementation is already captured
          by the gate. Removed to keep the dimension orthogonal.
      - key: other_unspecified
        was: seed
        reason: We don't use an "other" category.
      - key: unspecified_test_automation_tech
        reason: Too unspecific.
      - key: cf_interface_programming
        reason: Too unspecific.
      - key: logic_programming
        reason: Not a programming language.
      - key: commercial_optimization_software
        reason: Not a programming language.
      - key: apache_module
        reason: Not a programming language.
      - key: custom_dsl_implementation
        reason: ""
      - key: optimization_solver
        reason: ""
      - key: photogrammetry_tools
        reason: ""
      - key: petri_net_based
        reason: ""
      - key: bluetooth_embedded
        reason: ""
      - key: vr_development_tools
        reason: Die Rationale des Models erwähnt dass  eine explizite Nennung nicht vorhanden ist und wir spekulieren nicht.
      - key: vr_framework
        reason: Spekulation bei fehlender expliziten Nennnung
      - key: xml_standards
        reason: ''
      - key: uppaal_specific
        reason: Spekulation
      - key: sysml_uml_based
        reason: ''
      - key: prolog
        reason: Spekulation
      - key: directshow
        reason: Spekulation
      - key: logic_programming_languages
        reason: Spekulation
      - key: uml_based_modeling
        reason: UML is not a modelling language
    candidates:
      - key: radar_signal_processing_libraries
        count: 1
        example_ids: lni176/862
        rationale: Die Publikation nennt keine expliziten Programmiersprachen, aber die beschriebene hardwarenahe Verarbeitung (Radar, Video) und Echtzeitanforderungen legen nahe, dass C/C++ verwendet wurde (typisch für militärische/eingebettete Systeme). Eine neue Subkategorie 'radar_signal_processing_libraries' könnte die spezifischen Bibliotheken für Radar- und Videosignalverarbeitung umfassen, da diese im Text explizit erwähnt werden (z.B. 'CFAR algorithms', 'non linear filter algorithms').
      - key: unspecified_numerical_environment
        count: 1
        example_ids: lni176/907
        rationale: Die Publikation nennt keine explizite Programmiersprache oder Technologie. Allerdings handelt es sich um numerische Algorithmen, die typischerweise in Sprachen wie C/C++, MATLAB oder Python implementiert werden. Da keine konkrete Technologie genannt wird, kann keine der vorgegebenen Subkategorien vergeben werden. Es wird vorgeschlagen, eine neue Subkategorie 'unspecified_numerical_environment' für solche Fälle einzuführen.
      - key: visual_modeling_notation
        count: 1
        example_ids: lni184/181
        rationale: "Die Publikation nennt keine expliziten Programmiersprachen oder Technologien für die Implementierung von C4U. Stattdessen wird eine visuelle Modellierungsnotation (Karten mit Bildern, Texten und Pfeilen) verwendet, die in formale Spezifikationen überführt wird. Da keine klassischen Programmiersprachen genannt werden, wird 'visual_modeling_notation' als neue Subkategorie vorgeschlagen (vgl. Abschnitt 4: 'C4U als Interviewleitfaden' und die Beschreibung der Karten)."
      - key: unspecified_simulation_environment
        count: 1
        example_ids: lni19/GI-Proceedings.19-4
        rationale: Der Text erwähnt keine expliziten Programmiersprachen oder Technologien. Die Simulationen und evolutionären Algorithmen könnten in einer Vielzahl von Sprachen implementiert sein (z.B. C++, Python), aber dies ist nicht belegt. Daher wird 'unspecified_simulation_environment' als neue Subkategorie vorgeschlagen.
  evaluation:
    label: Evaluation der Forschungssoftware
    question: >
      Wie wird die Forschungssoftware evaluiert? Mit welcher Methode wird ihr
      Nutzen, ihre Qualität oder ihre Wirkung belegt? Mehrfachnennung möglich
      (die Methoden bauen im Idealfall aufeinander auf).
    multi: true
    active:
      - key: testing
        source: seed
        description: >
          Testen / Evaluate Software (M4): technischer Nachweis, dass die Software
          das tut, was sie soll — funktionale Korrektheit, Robustheit
          (Unit-/Integrationstests), ohne dass
          Versuchspersonen einbezogen werden. Unterscheidet sich von Performance, oder Benchmarking als speziellere Fälle
      - key: usability_study
        source: seed
        description: >
          Usability-Studie / Evaluate Usability (M3): Evaluation der Benutzbarkeit
          und Nutzererfahrung mit Versuchspersonen (z.B. Usability-Tests, SUS-/
          Fragebögen, Think-Aloud), ohne dass die Software bereits Gegenstand einer
          inhaltlichen Forschungsfrage ist.
      - key: empirical_study
        source: seed
        description: >
          Empirische Studie / Conduct Empirical Study (S1): die Software wird in
          einer empirischen Untersuchung eingesetzt, die eine inhaltliche
          Forschungsfrage beantwortet (z.B. kontrollierte Experimente, Feld- oder
          Interventionsstudien); die Software ist Mittel oder Gegenstand der
          Erkenntnisgewinnung, nicht nur das technische Artefakt.
      - key: conceptual_evaluation
        source: coder:alice
        description: Konzeptionelle Evaluation ist die Vorstellung des Gesamtkonzeptes bei Nutzer:innen oder Expert:innen und die Software wird basierend auf dem Konzept alleine bewertet
      - key: planned
        source: coder:alice
        description: '"eine Evaluation ist geplant, wenn das Konzept dargestellt ist, aber die Durchführung in der Zukunft liegt'
      - key: benchmarking
        source: coder:alice
        description: "Wissenschaftliches Benchmarking mit bekannter kanonischer Aufgabe (z.B. Performancetests oder Speichertests)"
      - key: performance_evaluation
        source: coder:alice,alice.backup-2026-06-19
        examples:
          - performance evaluation
        description: Performanzevaluation bezieht sich auf Research Software, die bestehende Prozesse wie zum Beispiel Testverfahren hinsichtlich Performanzmetriken wie Geschwindigkeit oder Speicherverbrauch evaluiert; dazu zählt auch, dass die Forschungssoftware getestet wird, indem sie mit vergleichbaren Alternativen für einen kanonischen Testfall gegenübergestellt wird
      - key: alternatives_comparison
        source: coder:alice
        description: Die Software wird durch Argumentation ohne Messungen (das wäre benchmarking) mit anderen Alternativen verglichen und als besser/innovativer ... befunden. Dies sollte in einem eigeen Kapitel oder Abschnitt dokumentiert sein.
    rejected: []
    candidates: []
